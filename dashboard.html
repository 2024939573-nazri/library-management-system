<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient( rgba(0,0,0,0.4), rgba(0,0,0,0.4) ), url('library.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .card {
            background: rgba(255,255,255,0.95);
        }

        h2 {
            color: white;
            font-weight: bold;
        }
        .navbar {
            padding-top: 10px;
            padding-bottom: 10px;
        }

        .navbar-brand img {
            height: 70px;
            width: auto;
        }
    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <img src="logo.png"
                     alt="UiTM Logo"
                     height="70"
                     class="me-3">

                <span class="fw-bold fs-4">
                    Library Management System
                </span>
            </a>

            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="books.html">Books</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="borrow.html">Borrow Records</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="categories.html">Categories</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-warning" href="index.html">
                            Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="dashboard-title">
            📚 Library Dashboard
        </h2>

        <div class="row mt-4">

            <div class="col-md-3">
                <div class="card stat-card books shadow">
                    <div class="card-body">
                        <h5>Total Books</h5>
                        <h2 class="text-dark stat-number counter" data-target="250">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card members shadow">
                    <div class="card-body">
                        <h5>Total Members</h5>
                        <h2 class="text-dark stat-number counter" data-target="80">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card borrowed shadow">
                    <div class="card-body">
                        <h5>Borrowed Books</h5>
                        <h2 class="text-dark stat-number counter" data-target="45">0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card stat-card available shadow">
                    <div class="card-body">
                        <h5>Available Books</h5>
                        <h2 class="text-dark stat-number counter" data-target="205">0</h2>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <div class="container">
        <div class="row mt-5 justify-content-center">
            <div class="col-md-8">
                <div class="card chart-card shadow-lg">
                    <div class="card-body">
                        <h5 class="text-center">Books by Category</h5>
                        <canvas id="bookChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0">
            © 2026 Library Management System | Developed by Nazri
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const counters = document.querySelectorAll('.counter');

        counters.forEach(counter => {

        const updateCounter = () => {

        const target = +counter.getAttribute('data-target');
        const current = +counter.innerText;

        const increment = target / 50;

        if(current < target){
        counter.innerText = Math.ceil(current + increment);
        setTimeout(updateCounter,30);
        }else{
        counter.innerText = target;
        }
        }

        updateCounter();

        });
    </script>

</body>
</html>
